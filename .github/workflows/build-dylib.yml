# build-dylib.yml
# 在 macOS runner 上编译 xnower.dylib
# 触发条件: push 到 ios-plugin/ 目录 或 手动触发

name: Build XNOW Dylib

on:
  push:
    paths:
      - "ios-plugin/**"
      - ".github/workflows/build-dylib.yml"
    branches: [main]
  workflow_dispatch:
    inputs:
      server_url:
        description: "WebSocket server URL"
        required: false
        default: "ws://192.129.210.52:8000"
      inject_ipa_url:
        description: "URL to decrypted TikTok IPA (optional)"
        required: false
        default: ""

jobs:
  build:
    name: Build xnower.dylib
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select oldest Xcode available (to avoid chained fixups)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null | sort
          # Try Xcode 15.0 first (has ld_classic)
          for xc in /Applications/Xcode_15.0.app /Applications/Xcode_15.0.1.app; do
            if [ -d "$xc" ]; then
              sudo xcode-select -s "$xc"
              echo "Selected: $xc"
              xcodebuild -version
              break
            fi
          done
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build dylib
        run: |
          cd ios-plugin/xnow-dylib
          # Always add -no_chained_fixups + -ld_classic as safety
          make dylib LDFLAGS="-Xlinker -no_chained_fixups -Xlinker -ld_classic" 2>&1
        env:
          MIN_IOS: "14.0"

      - name: Verify dylib (chained fixup check)
        run: |
          cd ios-plugin/xnow-dylib
          file build/xnower.dylib
          echo "=== Size ==="
          ls -lh build/xnower.dylib
          echo "=== Private fixup data ==="
          otool -l build/xnower.dylib | grep -E "DYLD_CHAINED|EXPORTS_TRIE|DYLD_INFO|PRIVATE" | head -10
          echo "=== Export raw for analysis ==="
          cp build/xnower.dylib build/xnower-raw.dylib
          ls -la build/

      - name: Prepare artifacts
        run: |
          cp ios-plugin/xnow-dylib/Config.plist ios-plugin/xnow-dylib/build/ 2>/dev/null || true
          ls -la ios-plugin/xnow-dylib/build/

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: xnower-dylib
          path: |
            ios-plugin/xnow-dylib/build/xnower.dylib
            ios-plugin/xnow-dylib/build/Config.plist
          retention-days: 30

  inject-ipa:
    name: Inject IPA (optional)
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.inject_ipa_url != ''
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: xnower-dylib
          path: ./build

      - name: Install tools
        run: |
          brew install ldid 2>/dev/null || true

      - name: Download IPA
        run: |
          IPA_URL="${{ github.event.inputs.inject_ipa_url }}"
          curl -L -o TikTok.ipa "$IPA_URL"
          ls -lh TikTok.ipa

      - name: Inject dylib into IPA
        run: |
          chmod +x ios-plugin/scripts/inject-ipa.sh
          bash ios-plugin/scripts/inject-ipa.sh \
            ./TikTok.ipa \
            ./build/xnower.dylib \
            ./TikTok_XNOW.ipa

      - name: Upload injected IPA
        uses: actions/upload-artifact@v4
        with:
          name: TikTok_XNOW.ipa
          path: ./TikTok_XNOW.ipa
          retention-days: 7
