# build-dylib.yml
# 在 macOS runner 上编译 xnower.dylib
# 触发条件: push 到 ios-plugin/ 目录 或 手动触发

name: Build XNOW Dylib

on:
  push:
    paths:
      - "ios-plugin/**"
      - ".github/workflows/build-dylib.yml"
    branches: [main]
  workflow_dispatch:
    inputs:
      server_url:
        description: "WebSocket server URL"
        required: false
        default: "ws://192.129.210.52:8000"
      inject_ipa_url:
        description: "URL to decrypted TikTok IPA (optional)"
        required: false
        default: ""

jobs:
  build:
    name: Build xnower.dylib
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select oldest Xcode available (to avoid chained fixups)
        run: |
          echo "=== Available Xcodes ==="
          ls -d /Applications/Xcode*.app 2>/dev/null | sort
          # Try Xcode 15.0 first (has ld_classic)
          for xc in /Applications/Xcode_15.0.app /Applications/Xcode_15.0.1.app; do
            if [ -d "$xc" ]; then
              sudo xcode-select -s "$xc"
              echo "Selected: $xc"
              xcodebuild -version
              break
            fi
          done
          xcrun --sdk iphoneos --show-sdk-path

      - name: Compile .o files (no linking)
        run: |
          cd ios-plugin/xnow-dylib
          make objs 2>&1
        env:
          MIN_IOS: "14.0"

      - name: Try different linker strategies
        run: |
          STRAT_DIR="/tmp/xnower-strategies"
          mkdir -p "$STRAT_DIR"
          cd ios-plugin/xnow-dylib

          # Strategy 1: -ld_classic (old Apple linker, generates old-style fixups)
          echo "=== Strategy 1: -ld_classic ==="
          make dylib LDFLAGS="-Xlinker -ld_classic" 2>&1 || true
          if [ -f build/xnower.dylib ]; then
            cp build/xnower.dylib "$STRAT_DIR/xnower-strat1.dylib"
            otool -l build/xnower.dylib | grep -E "DYLD_CHAINED|EXPORTS_TRIE|DYLD_INFO|PRIVATE" | head -10 || true
          else
            echo "Strategy 1 FAILED"
          fi
          echo "---"

          # Strategy 2: default Xcode 15.0.1 linker (new linker with maybe no chained fixups)
          echo "=== Strategy 2: default linker ==="
          make clean && make objs 2>&1 || true
          make dylib LDFLAGS="" 2>&1 || true
          if [ -f build/xnower.dylib ]; then
            cp build/xnower.dylib "$STRAT_DIR/xnower-strat2.dylib"
            otool -l build/xnower.dylib | grep -E "DYLD_CHAINED|EXPORTS_TRIE|DYLD_INFO|PRIVATE" | head -10 || true
          else
            echo "Strategy 2 FAILED"
          fi
          echo "---"

          # Strategy 3: try -Wl,-no_fixup_chains (GCC-compatible spelling)
          echo "=== Strategy 3: -no_fixup_chains ==="
          make clean && make objs 2>&1 || true
          make dylib LDFLAGS="-Wl,-no_fixup_chains" 2>&1 || true
          if [ -f build/xnower.dylib ]; then
            cp build/xnower.dylib "$STRAT_DIR/xnower-strat3.dylib"
            otool -l build/xnower.dylib | grep -E "DYLD_CHAINED|EXPORTS_TRIE|DYLD_INFO|PRIVATE" | head -10 || true
          else
            echo "Strategy 3 FAILED"
          fi

          # Check which strategies are compatible with iOS 16
          echo ""
          echo "=== Compatibility check ==="
          for f in "$STRAT_DIR"/*.dylib; do
            [ ! -f "$f" ] && continue
            name=$(basename "$f")
            priv=$(otool -l "$f" | grep -c "PRIVATE" || true)
            chain=$(otool -l "$f" | grep -c "CHAINED" || true)
            dyldinfo=$(otool -l "$f" | grep -c "LC_DYLD_INFO_ONLY\|LC_DYLD_INFO " || true)
            echo "$name: private=$priv chained=$chain dyld_info=$dyldinfo"
          done

          # Copy strategies back to build dir for artifact upload
          cp "$STRAT_DIR"/*.dylib build/ 2>/dev/null || true
          ls -la build/*.dylib 2>/dev/null || echo "No dylibs in build dir"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: xnower-dylib
          path: |
            ios-plugin/xnow-dylib/build/xnower-strat*.dylib
            ios-plugin/xnow-dylib/build/Config.plist
          retention-days: 30

  inject-ipa:
    name: Inject IPA (optional)
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.inject_ipa_url != ''
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: xnower-dylib
          path: ./build

      - name: Install tools
        run: |
          brew install ldid 2>/dev/null || true

      - name: Download IPA
        run: |
          IPA_URL="${{ github.event.inputs.inject_ipa_url }}"
          curl -L -o TikTok.ipa "$IPA_URL"
          ls -lh TikTok.ipa

      - name: Inject dylib into IPA
        run: |
          chmod +x ios-plugin/scripts/inject-ipa.sh
          bash ios-plugin/scripts/inject-ipa.sh \
            ./TikTok.ipa \
            ./build/xnower.dylib \
            ./TikTok_XNOW.ipa

      - name: Upload injected IPA
        uses: actions/upload-artifact@v4
        with:
          name: TikTok_XNOW.ipa
          path: ./TikTok_XNOW.ipa
          retention-days: 7
