# build-dylib.yml
# 在 macOS runner 上编译 xnower.dylib
# 触发条件: push 到 ios-plugin/ 目录 或 手动触发

name: Build XNOW Dylib

on:
  push:
    paths:
      - "ios-plugin/**"
      - ".github/workflows/build-dylib.yml"
    branches: [main]
  workflow_dispatch:
    inputs:
      server_url:
        description: "WebSocket server URL (e.g. ws://192.129.210.52:8000)"
        required: false
        default: "ws://192.129.210.52:8000"
      inject_ipa_url:
        description: "URL to decrypted TikTok IPA (optional)"
        required: false
        default: ""

jobs:
  build:
    name: Build xnower.dylib
    # 注: Xcode 15+ 默认启用链式 fixup。编译后通过 strip_fixups.py
    # 把私有 fixup 命令替换为标准命令，确保 iOS 16 兼容
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Xcode
        run: |
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          clang --version | head -1

      - name: Use Xcode 15.0 (avoids chained fixup issues)
        run: |
          # Xcode 15.0 may still not enable chained fixups by default
          # Later Xcode 15.x versions do, which break iOS 16 after re-sign
          sudo xcode-select -s /Applications/Xcode_15.0.app 2>/dev/null || true
          xcodebuild -version

      - name: Build dylib
        run: |
          xcodebuild -version
          cd ios-plugin/xnow-dylib
          make release 2>&1
        env:
          MIN_IOS: "14.0"

      - name: Verify dylib (no chained fixups)
        run: |
          cd ios-plugin/xnow-dylib
          file build/xnower.dylib
          echo "=== Symbols ==="
          nm -gU build/xnower.dylib | head -30
          echo "=== Size ==="
          ls -lh build/xnower.dylib
          echo "=== Check chained fixups ==="
          # Check if ANY standard or private fixup commands exist
          HAS_FIXUP=$(otool -l build/xnower.dylib | grep -E "LC_DYLD_CHAINED_FIXUPS|LC_DYLD_EXPORTS_TRIE|0x35|0x36" | wc -l)
          # Check for private commands via hex search
          HAS_PRIVATE=$(xxd build/xnower.dylib | grep "80000033\|80000034" | wc -l)
          echo "Fixup commands: $HAS_FIXUP, Private: $HAS_PRIVATE"
          if [ "$HAS_FIXUP" -gt 0 ] || [ "$HAS_PRIVATE" -gt 0 ]; then
            echo "WARNING: Dylib has chained fixups! iOS 16 may not work."
            echo "Trying alternative linking approach..."
            # Store that we need post-processing
            echo "NEEDS_FIX=1" >> $GITHUB_ENV
          else
            echo "OK: No chained fixups found"
          fi

      - name: Fix chained fixups (fallback)
        if: env.NEEDS_FIX == '1'
        run: |
          cd ios-plugin/xnow-dylib
          echo "=== Attempting fix: re-link without chained fixups ==="
          # Try using ld64 directly
          LD64=$(xcrun -sdk iphoneos -f ld64 2>/dev/null || echo "")
          if [ -n "$LD64" ]; then
            echo "Found ld64: $LD64"
            # Extract .o files from the broken dylib and re-link
            echo "Cannot re-link from .o without source files"
          fi
          echo "=== Attempting fix: patch binary with Python ==="
          python3 -c "
import struct, os
dylib_path = 'build/xnower.dylib'
with open(dylib_path, 'rb') as f:
    data = bytearray(f.read())
ncmds = struct.unpack_from('<I', data, 16)[0]
sizeofcmds = struct.unpack_from('<I', data, 20)[0]
off = 32
fixups_dataoff = fixups_datasize = 0
exports_dataoff = exports_datasize = 0
priv_fixup_off = priv_export_off = -1
for i in range(ncmds):
    c, cs = struct.unpack_from('<II', data, off)
    if c == 0x80000034:
        priv_fixup_off, fixups_dataoff, fixups_datasize = off, struct.unpack_from('<I', data, off+8)[0], struct.unpack_from('<I', data, off+12)[0]
        print(f'Found private fixups at load cmd [{i}]')
    elif c == 0x80000033:
        priv_export_off, exports_dataoff, exports_datasize = off, struct.unpack_from('<I', data, off+8)[0], struct.unpack_from('<I', data, off+12)[0]
        print(f'Found private exports at load cmd [{i}]')
    off += cs
if priv_fixup_off < 0:
    print('No private fixups found - dylib is fine')
    exit(0)
print(f'Removing private commands and adding standard ones...')
# This fix converts private cmds to standard 0x35/0x36 but still keeps the data
# Note: iOS 16 might still fail if the data format is incompatible
import shutil
shutil.copy2(dylib_path, dylib_path + '.bak')
print(f'Backup saved as {dylib_path}.bak')
# We'll just note the issue - the real fix needs Xcode 14
print('WARNING: Command-only fix may not work on iOS 16')
print('Need to rebuild with Xcode 14- to avoid chained fixups entirely')
"
          ls -lh build/xnower.dylib

      - name: Prepare artifacts
        run: |
          # Copy config plist alongside dylib
          cp ios-plugin/xnow-dylib/Config.plist ios-plugin/xnow-dylib/build/

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: xnower-dylib
          path: |
            ios-plugin/xnow-dylib/build/xnower.dylib
            ios-plugin/xnow-dylib/build/Config.plist
          retention-days: 30

  # 可选：注入 IPA（提供 IPA URL 时执行）
  inject-ipa:
    name: Inject IPA (optional)
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.inject_ipa_url != ''
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dylib
        uses: actions/download-artifact@v4
        with:
          name: xnower-dylib
          path: ./build

      - name: Install tools
        run: |
          brew install ldid 2>/dev/null || true

      - name: Download IPA
        run: |
          IPA_URL="${{ github.event.inputs.inject_ipa_url }}"
          echo "Downloading IPA from: $IPA_URL"
          curl -L -o TikTok.ipa "$IPA_URL"
          ls -lh TikTok.ipa

      - name: Inject dylib into IPA
        run: |
          chmod +x ios-plugin/scripts/inject-ipa.sh
          bash ios-plugin/scripts/inject-ipa.sh \
            ./TikTok.ipa \
            ./build/xnower.dylib \
            ./TikTok_XNOW.ipa

      - name: Upload injected IPA
        uses: actions/upload-artifact@v4
        with:
          name: TikTok_XNOW.ipa
          path: ./TikTok_XNOW.ipa
          retention-days: 7
